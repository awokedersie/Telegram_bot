{% extends "base.html" %}

{% block login_content %}
<div class="login-card">
    <div class="sidebar-logo" style="margin-bottom: 30px;">QuizBot <span>Admin</span></div>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="background: #fef2f2; border: 1px solid #fee2e2; padding: 10px; border-radius: 8px; margin-bottom: 20px; color: var(--error); font-size: 0.9rem;">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}
    
    <form method="POST">
        <div class="form-group" style="text-align: left;">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter Admin Username" required autofocus>
        </div>
        <div class="form-group" style="text-align: left;">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Admin Password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login to Dashboard</button>
    </form>
</div>
{% endblock %}
